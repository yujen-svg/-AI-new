<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨宇宙AI!</title>
  
  <style>
    /* 🎨 網路字型定義 */
    @font-face {
      font-family: 'AdobeMingStd';
      src: url('fonts/Adobe 明體 Std L.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'AdobeMingStd', "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: #1a1a1a;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
      background-size: 4px 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative; 
    }

    .btn-bluetooth {
      position: absolute;
      top: 10px;
      left: 10px;
      width: auto !important; 
      background: rgba(0, 0, 0, 0.5) !important; 
      color: #555555 !important; 
      border: 1px solid #333333 !important;
      padding: 4px 8px !important;
      font-size: 10px !important;
      font-weight: bold !important;
      letter-spacing: 1px !important;
      cursor: pointer;
      box-shadow: none !important; 
      border-radius: 2px;
      z-index: 9999; 
    }
    
    .btn-bluetooth::before { content: "" !important; }

    .btn-bluetooth:hover, .btn-bluetooth:active {
      background: #000000 !important;
      color: #8bd344 !important;
      border-color: #8bd344 !important;
    }

    .container {
      background: linear-gradient(135deg, rgba(12, 22, 43, 0.95), rgba(5, 42, 82, 0.95));
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 5px 5px;
      border: 4px solid #000000;
      box-shadow: 12px 12px 0px #000000, 0px 0px 35px rgba(0, 210, 255, 0.35);
      padding: 45px 35px;
      border-radius: 4px;
      width: 90%;
      max-width: 460px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      margin: 0 0 12px 0;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0px #000, 0px 0px 12px #8bd344;
    }

    h2 {
      font-size: 15px;
      color: #00d2ff; 
      background-color: #000000; 
      display: inline-block;
      padding: 6px 15px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.4;
      margin-bottom: 30px;
      box-shadow: 4px 4px 0px #8bd344;
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.95); 
      border: 3px solid #000000;
      border-radius: 0px;
      color: #8bd344; 
      font-family: monospace, 'AdobeMingStd', "PingFang TC";
      font-size: 16px;
      font-weight: bold;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 25px;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
    }

    textarea:focus {
      outline: none;
      border-color: #00d2ff;
      color: #00d2ff;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8), 0px 0px 15px rgba(0, 210, 255, 0.5);
    }

    button {
      width: 100%;
      background: #8bd344; 
      color: #000000;
      border: 3px solid #000000;
      padding: 15px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 6px 6px 0px #000000; 
      transition: all 0.1s ease;
    }

    #submitBtn::before { content: "▶ "; font-size: 14px; }

    button:hover {
      background: #00d2ff; 
      box-shadow: 4px 4px 0px #000000;
      transform: translate(2px, 2px);
    }

    button:active {
      box-shadow: 0px 0px 0px #000000;
      transform: translate(6px, 6px);
    }

    .result-box {
      margin-top: 25px;
      padding: 12px;
      background: #000000;
      border: 3px solid #8bd344;
      box-shadow: 6px 6px 0px rgba(0, 210, 255, 0.3);
      animation: glitchIn 0.2s linear;
    }
    
    .result-box h3 { margin: 0; font-size: 16px; color: #8bd344; }
    .hidden { display: none; }

    @keyframes glitchIn {
      0% { opacity: 0; transform: scaleY(0); }
      50% { opacity: 0.5; transform: scaleY(1.2) skewX(5deg); }
      100% { opacity: 1; transform: scaleY(1) skewX(0deg); }
    }
  </style>
</head>
<body>

  <button id="connectBleBtn" class="btn-bluetooth">⚙️ SYS_CONNECT</button>

  <div class="container">
    <h1>👋 歡迎光臨宇宙AI!</h1>
    <h2>關於2045年的未來世界，你有什麼想知道的嗎？</h2>

    <form id="questionForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSc0bNtRRcczXZrLHVULaiWmJnYXfdaMkdm8RhRLkCw4HAw-wg/formResponse" method="POST" target="hidden_iframe">
      <textarea id="questionInput" name="entry.1887716438" placeholder="請輸入您的問題..."></textarea>
      <button type="submit" id="submitBtn">送出問題</button>
    </form>
    
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <div id="resultBox" class="result-box hidden">
      <h3 id="statusText">您的提問已收到！</h3>
    </div>
  </div>

  <script>
    // ====== 🚀 自動化核心參數設定 ======
    const GEMINI_API_KEY = "AQ.Ab8RN6JKL1gQkg1s3SzSDakm3JvdTJP20ALDg3_4TvAE1UXSsA"; 
    const INVOICE_BG_URL = "發票Demo.jpg"; 
    
    let printCharacteristic = null;

    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const resultBox = document.getElementById('resultBox');
    const statusText = document.getElementById('statusText');
    const connectBleBtn = document.getElementById('connectBleBtn');

    const TARGET_SERVICE_UUID = '0000ae30-0000-1000-8000-00805f9b34fb';
    const TARGET_CHARACTERISTIC_UUID = '0000ae01-0000-1000-8000-00805f9b34fb';

    // 1. 藍牙連線機關
    connectBleBtn.addEventListener('click', async () => {
      try {
        statusText.innerText = "正在掃描所有藍牙裝置...";
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [TARGET_SERVICE_UUID]
        });
        
        statusText.innerText = "正在與發票機建立連線...";
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(TARGET_SERVICE_UUID);
        printCharacteristic = await service.getCharacteristic(TARGET_CHARACTERISTIC_UUID);
        
        alert(`🟢 時光發票機連線成功！\n已成功對接 MXW01`);
        connectBleBtn.style.display = 'none'; 
      } catch (error) {
        console.error("藍牙連線失敗:", error);
        alert("❌ 藍牙連線失敗:\n" + error.message);
      }
    });

    // 2. 表單送出事件
    questionForm.addEventListener('submit', async function(e) {
      const userQuestion = questionInput.value.trim();
      e.preventDefault(); 
      
      if (userQuestion === "") {
        alert("請先輸入您的時空疑問再送出喔！");
        return;
      }

      if (!printCharacteristic) {
        alert("⚠️ 請先點擊左上角進行藍牙配對！");
        return;
      }
      
      statusText.innerText = "⏳ 正在傳輸至 2045 年伺服器...";
      resultBox.classList.remove('hidden');

      try {
        const aiAnswer = await fetchGemini開示(userQuestion);
        
        try { questionForm.submit(); } catch(err){ console.log("Form submit skip"); }

        statusText.innerText = "🖨️ 時光機正在列印未來憑證...";
        
        await processAndPrint(userQuestion, aiAnswer);

        statusText.innerText = "✨ 傳輸成功！請在身旁領取未來發票。";
      } catch (error) {
        console.error("處理流程出錯:", error);
        statusText.innerText = "❌ 時空傳輸混亂，請重新嘗試。";
      }
      
      setTimeout(() => { questionInput.value = ""; }, 1000);
      setTimeout(() => { resultBox.classList.add('hidden'); }, 5000);
    });

    // 3. 串接 Gemini API
    async function fetchGemini開示(question) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      const systemInstruction = 
        "你是一個裝在時光機「REWIND THE FUTURE」互動裝置裡的宇宙 AI。\n" +
        "回覆限制：\n" +
        "1. 使用者會輸入關於2045年的未來世界，請給予對應且充滿想像、幽默且切合主題的解答。\n" +
        "2. 字數限制：繁體中文 30字至 60 字以內（包含標點符號）。\n" +
        "3. 格式限制：直接輸出解答內容，不要包含任何前言。";

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: question }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: { temperature: 0.8 }
        })
      });

      const data = await response.json();
      return data.candidates[0].content.parts[0].text.trim();
    }

    // 4. Canvas 文字折行
    function wrapText(ctx, text, maxWidth) {
      const words = Array.from(text);
      const lines = [];
      let currentLine = "";
      for (let i = 0; i < words.length; i++) {
        let testLine = currentLine + words[i];
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && i > 0) {
          lines.push(currentLine);
          currentLine = words[i];
        } else {
          currentLine = testLine;
        }
      }
      lines.push(currentLine);
      return lines;
    }

    // 5. 影像排版中樞（🔑 加入關鍵的 crossOrigin 允許跨網域讀取）
    function processAndPrint(question, aiAnswer) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // 🌟 核心修正：允許 GitHub Pages 跨來源像素讀取，防止 Canvas 被汙染而崩潰
        img.crossOrigin = "anonymous";
        img.src = INVOICE_BG_URL;

        img.onload = async function() {
          canvas.width = img.width || 384; 
          canvas.height = img.height || 450;
          
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          
          ctx.fillStyle = "#000000";
          ctx.font = "11px 'AdobeMingStd', serif";

          // 🎯 精准回歸你原本定義在發票底圖上的指定座標 (X:180)
          ctx.fillText(question.substring(0, 15), 180, 232); 
          
          const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });
          ctx.fillText(currentTime, 180, 272);

          // 解答斷行填入 (座標 X:80, Y:365)
          const lines = wrapText(ctx, aiAnswer, 260); // 寬度限制防爆邊
          let startY = 365; 
          for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], 80, startY + (i * 18));
          }

          try {
            await sendCanvasToPrinter(canvas);
            resolve();
          } catch (err) {
            reject(err);
          }
        };

        img.onerror = function() {
          console.warn("⚠️ 底圖加載異常，啟用後備白底模式。");
          canvas.width = 384; 
          canvas.height = 450;
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          ctx.fillStyle = "#000000";
          ctx.font = "12px 'AdobeMingStd', serif";
          ctx.fillText("提問: " + question.substring(0, 15), 40, 60); 
          const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });
          ctx.fillText("時間: " + currentTime, 40, 90);
          ctx.fillText("--- 來自 2045 年的開示 ---", 40, 130);
          
          const lines = wrapText(ctx, aiAnswer, 300);
          let startY = 160; 
          for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], 40, startY + (i * 22));
          }

          sendCanvasToPrinter(canvas).then(resolve).catch(reject);
        };
      });
    }

    // 6. 二值化影像數據與低速率安全分包
    async function sendCanvasToPrinter(canvas) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const width = canvas.width;
      const height = canvas.height;
      
      const widthBytes = Math.ceil(width / 8);
      const header = new Uint8Array([0x1D, 0x76, 0x30, 0, widthBytes & 0xFF, (widthBytes >> 8) & 0xFF, height & 0xFF, (height >> 8) & 0xFF]);
      
      const bitmap = new Uint8Array(widthBytes * height);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = (y * width + x) * 4;
          const r = imgData.data[idx];
          const g = imgData.data[idx+1];
          const b = imgData.data[idx+2];
          const gray = 0.299 * r + 0.587 * g + 0.114 * b;
          
          if (gray < 128) { 
            const byteIdx = y * widthBytes + Math.floor(x / 8);
            const bitIdx = 7 - (x % 8);
            bitmap[byteIdx] |= (1 << bitIdx);
          }
        }
      }

      const combined = new Uint8Array(header.length + bitmap.length);
      combined.set(header);
      combined.set(bitmap, header.length);

      const chunkSize = 20;
      for (let i = 0; i < combined.length; i += chunkSize) {
        const chunk = combined.slice(i, i + chunkSize);
        await printCharacteristic.writeValueWithoutResponse(chunk); 
        await new Promise(r => setTimeout(r, 15)); 
      }

      const feedCut = new Uint8Array([0x1B, 0x64, 4, 0x1D, 0x56, 1]);
      try {
        await printCharacteristic.writeValueWithoutResponse(feedCut);
      } catch(e) {
        console.log("切紙指令完畢");
      }
    }
  </script>
</body>
</html>
