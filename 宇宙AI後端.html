<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨宇宙AI!</title>
  
  <style>
    /* 全域 Y2K 復古未來感字型與深灰單色底 */
    body {
      font-family: "Adobe Ming Std", "Adobe Ming Std L", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: #1a1a1a;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
      background-size: 4px 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* 藍牙連線按鈕：獨立定位在整個網頁的最左上角，極度隱蔽，防觀眾誤點 */
    .btn-bluetooth {
      position: absolute;
      top: 10px;
      left: 10px;
      width: auto !important; 
      background: rgba(0, 0, 0, 0.5) !important; 
      color: #555555 !important; 
      border: 1px solid #333333 !important;
      padding: 4px 8px !important;
      font-size: 10px !important;
      font-weight: bold !important;
      letter-spacing: 1px !important;
      cursor: pointer;
      box-shadow: none !important; 
      border-radius: 2px;
      z-index: 9999; 
    }
    
    .btn-bluetooth::before {
      content: "" !important; 
    }

    /* 工作人員操作摸到時才會亮起螢光綠 */
    .btn-bluetooth:hover, .btn-bluetooth:active {
      background: #000000 !important;
      color: #8bd344 !important;
      border-color: #8bd344 !important;
    }

    /* 呼應海報的粗高對比拼貼風格卡片 */
    .container {
      background: linear-gradient(135deg, rgba(12, 22, 43, 0.95), rgba(5, 42, 82, 0.95));
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 5px 5px;
      border: 4px solid #000000;
      box-shadow: 12px 12px 0px #000000, 0px 0px 35px rgba(0, 210, 255, 0.35);
      padding: 45px 35px;
      border-radius: 4px;
      width: 90%;
      max-width: 460px;
      box-sizing: border-box;
      text-align: center;
    }

    /* 標題：螢光綠外發光，複製海報字體質感 */
    h1 {
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      margin: 0 0 12px 0;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0px #000, 0px 0px 12px #8bd344;
    }

    /* 副標題：宇宙科技藍文字，黑底反白標籤 */
    h2 {
      font-size: 15px;
      color: #00d2ff; 
      background-color: #000000; 
      display: inline-block;
      padding: 6px 15px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.4;
      margin-bottom: 30px;
      box-shadow: 4px 4px 0px #8bd344;
    }

    /* 提問輸入框：黑底、螢光綠字的終端機風格 */
    textarea {
      width: 100%;
      height: 130px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.95); 
      border: 3px solid #000000;
      border-radius: 0px;
      color: #8bd344; 
      font-family: monospace, "PingFang TC";
      font-size: 16px;
      font-weight: bold;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 25px;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
    }

    textarea:focus {
      outline: none;
      border-color: #00d2ff;
      color: #00d2ff;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8), 0px 0px 15px rgba(0, 210, 255, 0.5);
    }

    /* 全域大按鈕：老式機械播放鍵風格 */
    button {
      width: 100%;
      background: #8bd344; 
      color: #000000;
      border: 3px solid #000000;
      padding: 15px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 6px 6px 0px #000000; 
      transition: all 0.1s ease;
    }

    #submitBtn::before {
      content: "▶ ";
      font-size: 14px;
    }

    button:hover {
      background: #00d2ff; 
      box-shadow: 4px 4px 0px #000000;
      transform: translate(2px, 2px);
    }

    button:active {
      box-shadow: 0px 0px 0px #000000;
      transform: translate(6px, 6px);
    }

    /* 成功提示框 */
    .result-box {
      margin-top: 25px;
      padding: 12px;
      background: #000000;
      border: 3px solid #8bd344;
      box-shadow: 6px 6px 0px rgba(0, 210, 255, 0.3);
      animation: glitchIn 0.2s linear;
    }
    
    .result-box h3 {
      margin: 0;
      font-size: 16px;
      color: #8bd344;
    }

    .hidden {
      display: none;
    }

    @keyframes glitchIn {
      0% { opacity: 0; transform: scaleY(0); }
      50% { opacity: 0.5; transform: scaleY(1.2) skewX(5deg); }
      100% { opacity: 1; transform: scaleY(1) skewX(0deg); }
    }
  </style>
</head>
<body>

  <button id="connectBleBtn" class="btn-bluetooth">⚙️ SYS_CONNECT</button>

  <div class="container">
    <h1>👋 歡迎光臨宇宙AI!</h1>
    <h2>關於2045年的未來世界，你有什麼想知道的嗎？</h2>

    <form id="questionForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSc0bNtRRcczXZrLHVULaiWmJnYXfdaMkdm8RhRLkCw4HAw-wg/formResponse" method="POST" target="hidden_iframe">
      <textarea id="questionInput" name="entry.1887716438" placeholder="請輸入您的問題..."></textarea>
      <button type="submit" id="submitBtn">送出問題</button>
    </form>
    
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <div id="resultBox" class="result-box hidden">
      <h3 id="statusText">您的提問已收到！</h3>
    </div>
  </div>

  <script>
    // ====== 🚀 自動化核心參數設定 ======
    const GEMINI_API_KEY = "AQ.Ab8RN6JKL1gQkg1s3SzSDakm3JvdTJP20ALDg3_4TvAE1UXSsA"; 
    const INVOICE_BG_URL = "發票Demo.jpg"; // 請確認圖檔與本 HTML 在同個目錄下
    
    let printCharacteristic = null;

    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const resultBox = document.getElementById('resultBox');
    const statusText = document.getElementById('statusText');
    const connectBleBtn = document.getElementById('connectBleBtn');

    // 1. 藍牙連線機關
    connectBleBtn.addEventListener('click', async () => {
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['0000ff00-0000-1000-8000-00805f9b34fb'] 
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('0000ff00-0000-1000-8000-00805f9b34fb');
        const characteristics = await service.getCharacteristics();
        
        printCharacteristic = characteristics[0];
        alert("🟢 時光發票機連線成功！配對完畢。");
        connectBleBtn.style.display = 'none'; // 連線成功後功成身退隱藏
      } catch (error) {
        console.error(error);
        alert("❌ 藍牙連線失敗: " + error);
      }
    });

    // 2. 表單送出異步攔截事件
    questionForm.addEventListener('submit', async function(e) {
      const userQuestion = questionInput.value.trim();
      
      if (userQuestion === "") {
        alert("請先輸入您的時空疑問再送出喔！");
        e.preventDefault(); 
        return;
      }

      if (!printCharacteristic) {
        alert("⚠️ 偵測到發票機尚未連線！請先點擊網頁最左上角 ⚙️ SYS_CONNECT 進行藍牙配對。");
        e.preventDefault();
        return;
      }
      
      statusText.innerText = "⏳ 正在傳輸至 2045 年伺服器...";
      resultBox.classList.remove('hidden');
      e.preventDefault(); // 攔截跳轉

      try {
        // A. 呼叫 Gemini API 獲取解答
        const aiAnswer = await fetchGemini開示(userQuestion);
        
        // B. 背景秘密提交表單給 Google Form
        questionForm.submit();

        statusText.innerText = "🖨️ 時光機正在列印未來憑證...";

        // C. 本地 Canvas 圖片合成與藍牙列印
        await processAndPrint(userQuestion, aiAnswer);

        statusText.innerText = "✨ 傳輸成功！請在身旁領取未來發票。";
      } catch (error) {
        console.error(error);
        statusText.innerText = "❌ 時空傳輸混亂，請重新嘗試。";
      }
      
      // 1秒後清空輸入框
      setTimeout(() => {
        questionInput.value = "";
      }, 1000);
      
      // 5秒後狀態提示框自動消失
      setTimeout(() => {
        resultBox.classList.add('hidden');
      }, 5000);
    });

    // 3. Web Fetch 串接 Gemini API
    async function fetchGemini開示(question) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      
      const systemInstruction = 
        "你是一個裝在時光機「REWIND THE FUTURE」互動裝置裡的宇宙 AI。\n" +
        "回覆限制：\n" +
        "1. 使用者會輸入關於2045年的未來世界，請給予對應且充滿想像、幽默且切合主題的解答。\n" +
        "2. 字數限制：繁體中文 30字至 60 字以內（包含標點符號）。\n" +
        "3. 格式限制：不要包含任何前言或「好的，以下是我的回答」等廢話，直接輸出解答內容。因為你的回答將被直接印在熱感應紙上，請確保斷句清晰。";

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: question }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: { temperature: 0.8 }
        })
      });

      const data = await response.json();
      return data.candidates[0].content.parts[0].text.trim();
    }

    // 4. Canvas 文字自動折行演算法
    function wrapText(ctx, text, maxWidth) {
      const words = Array.from(text);
      const lines = [];
      let currentLine = "";

      for (let i = 0; i < words.length; i++) {
        let testLine = currentLine + words[i];
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && i > 0) {
          lines.push(currentLine);
          currentLine = words[i];
        } else {
          currentLine = testLine;
        }
      }
      lines.push(currentLine);
      return lines;
    }

    // 5. 影像渲染排版中樞（使用 Adobe 明體 Std L、8pt 規格）
    function processAndPrint(question, aiAnswer) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = INVOICE_BG_URL;

        img.onload = async function() {
          canvas.width = img.width;
          canvas.height = img.height;
          
          // 繪製發票底圖
          ctx.drawImage(img, 0, 0);

          // 設定字體與顏色（發票印刷一律純黑，設定為 Adobe 明體）
          ctx.fillStyle = "#000000";
          
          // 8pt 換算為畫布像素大約是 11px
          const fontSize = "11px";
          const fontFamily = "'Adobe Ming Std', 'Adobe Ming Std L', 'PingFang TC', serif";
          ctx.font = `${fontSize} ${fontFamily}`;

          // D. 自動帶入觀眾提問 (擷取前 15 個字防止爆框，座標 X:180, Y:232)
          ctx.fillText(question.substring(0, 15), 180, 232); 
          
          // E. 自動帶入現在時間 (格式如: 2026/6/3 00:45:00，座標 X:180, Y:272)
          const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });
          ctx.fillText(currentTime, 180, 272);

          // F. 自動帶入 AI 解答（帶入自動折行，寬度限制 400px，8pt 字體行高設為 18px）
          const lines = wrapText(ctx, aiAnswer, 400);
          let startY = 365; // 解答起始高度
          for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], 80, startY + (i * 18));
          }

          try {
            await sendCanvasToPrinter(canvas);
            resolve();
          } catch (err) {
            reject(err);
          }
        };
        img.onerror = () => reject("底圖加載出錯，請檢查 發票Demo.jpg 是否在同資料夾下。");
      });
    }

    // 6. 二值化影像數據與藍牙分包指令發射
    async function sendCanvasToPrinter(canvas) {
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const width = canvas.width;
      const height = canvas.height;
      
      const widthBytes = Math.ceil(width / 8);
      const header = new Uint8Array([0x1D, 0x76, 0x30, 0, widthBytes & 0xFF, (widthBytes >> 8) & 0xFF, height & 0xFF, (height >> 8) & 0xFF]);
      
      const bitmap = new Uint8Array(widthBytes * height);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = (y * width + x) * 4;
          const r = imgData.data[idx];
          const g = imgData.data[idx+1];
          const b = imgData.data[idx+2];
          const gray = 0.299 * r + 0.587 * g + 0.114 * b;
          
          if (gray < 128) { 
            const byteIdx = y * widthBytes + Math.floor(x / 8);
            const bitIdx = 7 - (x % 8);
            bitmap[byteIdx] |= (1 << bitIdx);
          }
        }
      }

      const combined = new Uint8Array(header.length + bitmap.length);
      combined.set(header);
      combined.set(bitmap, header.length);

      const chunkSize = 20;
      for (let i = 0; i < combined.length; i += chunkSize) {
        const chunk = combined.slice(i, i + chunkSize);
        await printCharacteristic.writeValue(chunk);
        await new Promise(r => setTimeout(r, 5));
      }

      // 走紙與切紙指令
      const feedCut = new Uint8Array([0x1B, 0x64, 3, 0x1D, 0x56, 1]);
      await printCharacteristic.writeValue(feedCut);
    }
  </script>
</body>
</html>
